    user: "opsadmin"
    group: "opsadmin"

  tasks:
  - name: create opsadmin user
    user: 
      name: "{{ user }}"
      password: "{{ 'Goodsense@123' | password_hash('sha512') }}"

  - name: configure ssh login
  # 直接使用神仙模块 authorized_key！它会自动帮你建 .ssh 目录，设好 0700 权限，并保证公钥只添加一次。
    authorized_key:
      user: "{{ user }}"
      state: present
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIxocYkl4MFvtYABklz9otY14QUeGrJdHc3MjMKPJCre pjlab\gongzhenglei@PJNL251080141W"

  # 使用 lineinfile 替代 sed
  - name: change sshd_config
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^#?PermitRootLogin'
      line: 'PermitRootLogin no'
    notify: restart sshd service
