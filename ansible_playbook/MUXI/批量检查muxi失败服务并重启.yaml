- name: 检查并修复 Failed 服务
  hosts: ecp
  become: yes
  gather_facts: no
  vars:
    target_services: [muxi-acs, muxi-pfc, muxi-rdma]

  tasks:
    - name: 获取服务状态
      shell: "systemctl is-failed {{ item }} || true"
      register: failed_status
      loop: "{{ target_services }}"
      changed_when: false

    - name: 报告并重启 Failed 的服务
      systemd:
        name: "{{ item.item }}"
        state: restarted
      when: item.stdout == "failed"
      loop: "{{ failed_status.results }}"
      loop_control:
        label: "{{ item.item }}"