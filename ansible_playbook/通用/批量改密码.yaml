- name: cron job to check gpu state
  host: all
  become: yes
  gather_facts: no

  vars:
    source_path: /home/test6/check_gpu_status.sh
    dest_path: /root/check_gpu_status.sh

  tasks:
  - name: create file
    copy:
      src: "{{ source_path }}"
      des: "{{ dest_path }}"
      mode: '0755'

  - name: create cron job to run the script
    cron:
      name: "run the gpu status script"
      minute: "10"
      hour: "0"
      job: "bash {{ dest_path }}"
      user: root
